# packages.conf, Listes de paquets par profil pour onboard.sh
#
# Ce fichier est ÉDITABLE : adaptez les listes à vos besoins. Il est chargé
# (sourcé) par onboard.sh. Respectez la syntaxe Bash des tableaux :
#
#     NOM_DU_TABLEAU=(
#       paquet1
#       paquet2
#     )
#
# Les noms employés sont « génériques » : onboard.sh les traduit si besoin
# vers le nom réel du gestionnaire cible (voir lib/packages.sh -> map_package_name).
#
# Le pseudo-paquet « docker » déclenche l'installation du moteur Docker
# (paquet adapté à la distro) plutôt qu'un simple « install docker ».
#
# Deux profils sont définis :
#   - minimal : strict nécessaire pour une machine utilisable.
#   - dev     : profil minimal + outils orientés développement (dont Docker).
#
# Le profil par défaut est défini par DEFAULT_PROFILE.

# Profil utilisé si --profile n'est pas précisé sur la ligne de commande.
DEFAULT_PROFILE="dev"

# --- Profil « minimal » -----------------------------------------------------
# Outils de base indispensables : récupération de fichiers, édition, archives,
# certificats racine pour le TLS.
PACKAGES_MINIMAL=(
  ca-certificates
  curl
  wget
  git
  vim
  unzip
)

# --- Profil « dev » ---------------------------------------------------------
# Reprend le minimal et ajoute des outils d'exploitation et de développement :
# supervision (htop), manipulation JSON (jq) et le moteur de conteneurs Docker.
PACKAGES_DEV=(
  ca-certificates
  curl
  wget
  git
  vim
  unzip
  htop
  jq
  docker
)
